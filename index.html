<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman Game Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:1200px;
}

.dashboard{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:30px;
}

.card{
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.title{
    text-align:center;
    font-size:40px;
    margin-bottom:30px;
    color:#38bdf8;
}

.subtitle{
    font-size:24px;
    margin-bottom:20px;
    color:#facc15;
}

.info p{
    margin:15px 0;
    font-size:18px;
}

.word{
    letter-spacing:10px;
    font-size:35px;
    margin-top:20px;
    text-align:center;
    color:#22c55e;
}

.input-box{
    margin-top:25px;
    text-align:center;
}

input{
    padding:12px;
    width:70px;
    text-align:center;
    font-size:25px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-left:10px;
    transition:0.3s;
}

button:hover{
    background:#0ea5e9;
}

.message{
    margin-top:20px;
    text-align:center;
    font-size:22px;
    color:#f87171;
}

.hangman{
    font-family:monospace;
    white-space:pre;
    font-size:22px;
    line-height:1.2;
    text-align:center;
    margin-top:20px;
}

.stats{
    display:flex;
    justify-content:space-between;
    margin-top:20px;
    font-size:20px;
}

.footer{
    margin-top:30px;
    text-align:center;
    color:#94a3b8;
}

@media(max-width:900px){

    .dashboard{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="container">

    <h1 class="title">HANGMAN GAME DASHBOARD</h1>

    <div class="dashboard">

        <!-- LEFT SIDE -->
        <div class="card">

            <h2 class="subtitle">Game Information</h2>

            <div class="info">

                <p><strong>Category:</strong> Months</p>
                <p><strong>Difficulty:</strong> Medium</p>
                <p><strong>Status:</strong> Playing</p>

            </div>

            <div class="word">
                _ _ _ _ _
            </div>

            <div class="input-box">

                <input type="text" maxlength="1" placeholder="A">

                <button>Guess</button>

            </div>

            <div class="message">
                Guess a letter!
            </div>

            <div class="stats">

                <div>
                    ❤️ Lives: 3
                </div>

                <div>
                    ⭐ Score: 120
                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="card">

            <h2 class="subtitle">Hangman</h2>

            <div class="hangman">

 ___________________
 |                 |
 O                 |
/|\                |
/ \                |
====================

            </div>

            <div class="footer">

                PF Project - Hangman Game Dashboard

            </div>

        </div>

    </div>

</div>

</body>
</html>
